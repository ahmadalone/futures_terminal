version: '3.8'
services:
  terminal:
    build: .
    container_name: futures_terminal
    environment:
      - DISPLAY=${DISPLAY}         # For GUI; set to host display or remove if headless
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET=${BINANCE_SECRET}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - /tmp/.X11-unix:/tmp/.X11-unix   # X11 forwarding for GUI
    network_mode: host
    restart: unless-stopped